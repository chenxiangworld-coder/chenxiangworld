baseURL = 'https://chenxiangworld.com/'
title = '在中关村写诗'
theme = 'paper'

defaultContentLanguage = 'zh'

[languages]
  [languages.zh]
    languageCode = 'zh-cn'
    languageName = '中文'
    weight = 1
    [languages.zh.params]
      color = 'linen'
      avatar = 'https://chenxiangworld.com/chenxiang.jpg'
      name = '陈翔'
      bio = '记录写过的一些诗'

  [languages.en]
    weight = 2
    languageName = "EN"
    title = "Writing Poems in Beijing"
    [languages.en.params]
      color = 'linen'
      avatar = 'https://chenxiangworld.com/chenxiang.jpg'
      name = 'Sean Chen'
      bio = "A record of some poems I've written."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.typographer]
      disable = true

[params]
  color = 'linen'
