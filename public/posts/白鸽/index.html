  <section><p>雪地上的白鸽比雪更白，
像一朵云在冰面滑行。
花园刚下过雪，一只鸽子
游走于白色的分岔小径。</p>
<p>它身上是无人踩踏过的雪，
保留了源流的轻柔与寂静。
它移动着二十四帧影像的光辉，
比追逐它的少女还要纯洁。</p>
<p>鸽子身在雪中，但脱离雪而存在。
像一个置身于人群中的个体。
它的心比身的疆域更辽阔，
自成一个不受搅动的宇宙。</p>
<p>世间可有比这更浑然的事物？
这尊小小的白金塑像，
如达·芬奇绘制的立体几何，
始终在运动中，恪守美的尊严。</p>
